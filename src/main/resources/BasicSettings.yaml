environment: ZT004

# Available modes: selenium | api | mobile
framework: selenium

# ── Execution Settings ──
execution:
    timeout: 10            # seconds
    pageLoadTimeout: 30    # seconds
    pollingInterval: 250   # milliseconds
    threadCount: 4

selenium:
    grid: false            # true = Remote (Grid), false = Local
    debug: false
    headless: false
    maximizeWindow: true
    windowWidth: 1920
    windowHeight: 1080

grid:
    hubUrl: "http://localhost:4444/wd/hub"