name: Selenium Grid Test Suite

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'  # Run at 6 AM UTC, Monday-Friday
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - stage
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      execution_mode:
        description: 'Execution mode'
        required: true
        default: 'LOCAL'
        type: choice
        options:
          - LOCAL
          - GRID
      headless:
        description: 'Headless mode'
        required: true
        default: true
        type: boolean

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'qa' }}
  BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
  EXECUTION_MODE: ${{ github.event.inputs.execution_mode || 'LOCAL' }}
  HEADLESS: ${{ github.event.inputs.headless || true }}

jobs:
  test:
    name: Run UI Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox, edge]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: 'latest'

      - name: Setup Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1
        with:
          edge-version: 'stable'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Project
        run: mvn clean compile -q
        env:
          MAVEN_OPTS: "-Xmx1024m"

      - name: Run Tests
        run: |
          mvn clean test \
            -DsuiteXmlFile=testng.xml \
            -Denvironment=${{ env.ENVIRONMENT }} \
            -Dbrowser=${{ matrix.browser }} \
            -Dexecution.mode=${{ env.EXECUTION_MODE }} \
            -Dexecution.headless=true \
            -Dexecution.threadCount=2
        continue-on-error: true
        env:
          MAVEN_OPTS: "-Xmx2048m"

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report
        continue-on-error: true

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: target/allure-report/
          retention-days: 7

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/screenshots/
            target/logs/
          retention-days: 7

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/
          retention-days: 7

  allure-report:
    name: Publish Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/
          destination_dir: allure-reports/${{ github.run_id }}
          keep_files: true
