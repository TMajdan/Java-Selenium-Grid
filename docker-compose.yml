# =============================================================================
# Selenium Grid 4 - Docker Compose
# =============================================================================
# Użycie:
#   docker compose up -d                        # uruchom Grid
#   docker compose up -d --scale chrome=3       # 3 node'y Chrome
#   docker compose logs -f                      # podgląd logów
#   docker compose down                         # zatrzymaj Grid
#
# Po uruchomieniu:
#   http://localhost:4444          → Grid Console
#   http://localhost:4444/status   → Grid Status API
#
# Uruchomienie testów:
#   mvn clean test -Dexecution.mode=GRID
# =============================================================================

services:

  # ===========================================================================
  # Selenium Hub - centralny router/distributor
  # ===========================================================================
  selenium-hub:
    image: selenium/hub:4.30.0
    container_name: selenium-hub
    ports:
      - "4442:4442"    # Event Bus - publish
      - "4443:4443"    # Event Bus - subscribe
      - "4444:4444"    # Grid Console / API
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_REJECT_UNSUPPORTED_CAPS=false
      - SE_NEW_SESSION_THREAD_POOL_SIZE=24
      - SE_ENABLE_TLS=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - selenium-grid

  # ===========================================================================
  # Chrome Node
  # ===========================================================================
  chrome:
    image: selenium/node-chrome:4.30.0
    container_name: selenium-node-chrome
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_PASSWORD=selenium
      - SE_ENABLE_TLS=false
    ports:
      - "5901:5900"    # VNC (opcjonalnie, do podglądu)
    networks:
      - selenium-grid

  # ===========================================================================
  # Firefox Node
  # ===========================================================================
  firefox:
    image: selenium/node-firefox:4.30.0
    container_name: selenium-node-firefox
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_PASSWORD=selenium
      - SE_ENABLE_TLS=false
    ports:
      - "5902:5900"    # VNC
    networks:
      - selenium-grid

  # ===========================================================================
  # Edge Node
  # ===========================================================================
  edge:
    image: selenium/node-edge:4.30.0
    container_name: selenium-node-edge
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_PASSWORD=selenium
      - SE_ENABLE_TLS=false
    ports:
      - "5903:5900"    # VNC
    networks:
      - selenium-grid

  # ===========================================================================
  # (Opcjonalnie) Chrome Debug - oddzielny node z możliwością nagrywania wideo
  # ===========================================================================
  chrome-video:
    image: selenium/node-chrome:4.30.0
    container_name: selenium-node-chrome-video
    shm_size: 2gb
    profiles:
      - video              # uruchom: docker compose --profile video up -d
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_VNC_PASSWORD=selenium
      - SE_ENABLE_TLS=false
      - SE_NODE_SESSION_TIMEOUT=600
      - SE_UPLOAD_DIRECTORY=/opt/selenium/uploads
    volumes:
      - ./video:/opt/selenium/video
    ports:
      - "5904:5900"
    networks:
      - selenium-grid

  # ===========================================================================
  # Selenium Grid Router - UI do monitorowania
  # ===========================================================================
  # Uruchom: docker compose --profile monitor up -d
  # Otwórz: http://localhost:8080
  selenium-grid-monitor:
    image: dawidmalina/selenium-grid-monitor:latest
    container_name: selenium-grid-monitor
    profiles:
      - monitor
    ports:
      - "8080:8080"
    environment:
      - SELENIUM_HUB_URL=http://selenium-hub:4444
      - REFRESH_INTERVAL=5000
    depends_on:
      - selenium-hub
    networks:
      - selenium-grid

networks:
  selenium-grid:
    driver: bridge
